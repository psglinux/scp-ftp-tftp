name: Release — Build & Publish

on:
  push:
    tags: ['v*']

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            cpack_gen: DEB
            asset_glob: "*.deb"
          - os: windows-latest
            name: Windows
            cpack_gen: NSIS
            asset_glob: "*.exe"
          - os: macos-latest
            name: macOS
            cpack_gen: DragNDrop
            asset_glob: "*.dmg"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # ---------- Linux ----------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-base-dev libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev docker-compose-v2

      - name: Start Docker test servers (Linux)
        if: runner.os == 'Linux'
        working-directory: tests
        run: |
          docker compose up -d
          sleep 15
          docker ps

      # ---------- macOS ----------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 curl
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"

      # ---------- Windows ----------
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: win64_msvc2019_64

      - name: Install libcurl via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: vcpkg install "curl[ssh]:x64-windows-static-md"

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      # ---------- Build & Test ----------
      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXTRA="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static-md"
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release $EXTRA

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      # ---------- Package ----------
      - name: Package
        working-directory: build
        shell: bash
        run: |
          if ! cpack -G ${{ matrix.cpack_gen }} -C Release; then
            echo "Primary packaging (${{ matrix.cpack_gen }}) failed, falling back to ZIP"
            cpack -G ZIP -C Release
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            build/GotiKinesis-*.deb
            build/GotiKinesis-*.exe
            build/GotiKinesis-*.dmg
            build/GotiKinesis-*.zip

  # ---------- Create GitHub Release ----------
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip

  # ---------- Success notification with download URL ----------
  notify-success:
    needs: [build, publish]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send release email with download URL
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GotiKinesis] Release ${{ github.ref_name }} is ready"
          to: ${{ secrets.SMTP_USERNAME }}
          from: GotiKinesis CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            GotiKinesis ${{ github.ref_name }} has been built and published.

            Download: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}

            CI run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ---------- Failure notification ----------
  notify-failure:
    needs: [build, publish]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GotiKinesis Release] FAILED for ${{ github.ref_name }}"
          to: ${{ secrets.SMTP_USERNAME }}
          from: GotiKinesis CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Release build failed for GotiKinesis ${{ github.ref_name }}.

            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}

            Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
